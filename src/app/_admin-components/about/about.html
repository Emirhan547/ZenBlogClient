<h3>About Contents</h3>

<table class="table table-bordered table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th>Title</th>
      <th>Description</th>
      <th>Image Url</th>
      <th>Options</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of abouts; let i = index">
      <th>{{ i + 1 }}</th>
      <td>{{ item.title }}</td>
      <td>{{ item.description | slice: 0:100 }}</td>
      <td><a [href]="item.imageUrl" target="_blank">Image</a></td>
      <td>
        <button class="btn btn-outline-danger" (click)="delete(item.id)"><i class="fa fa-trash"></i></button>
        <button class="btn btn-outline-info ms-2" data-bs-toggle="modal" data-bs-target="#editModal" (click)="onSelected(item)"><i class="fa fa-edit"></i></button>
      </td>
    </tr>
  </tbody>
</table>

<button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#createModal"><i class="fa fa-plus"></i> New About</button>

<div class="modal fade" id="createModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Create About</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form #createForm="ngForm" (ngSubmit)="create(); createForm.resetForm()">
          <div class="row g-2">
            <div class="col-md-12"><input class="form-control" placeholder="Title" name="title" [(ngModel)]="newAbout.title" /></div>
            <div class="col-12"><textarea class="form-control" placeholder="Description" name="description" [(ngModel)]="newAbout.description"></textarea></div>
            <div class="col-md-12"><input class="form-control" placeholder="Image Url" name="imageUrl" [(ngModel)]="newAbout.imageUrl" /></div>
          </div>
          <div class="modal-footer mt-3">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Update About</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form #editForm="ngForm" (ngSubmit)="update()">
          <div class="row g-2">
            <div class="col-md-12"><input class="form-control" placeholder="Title" name="title" [(ngModel)]="editAbout.title" /></div>
            <div class="col-12"><textarea class="form-control" placeholder="Description" name="description" [(ngModel)]="editAbout.description"></textarea></div>
            <div class="col-md-12"><input class="form-control" placeholder="Image Url" name="imageUrl" [(ngModel)]="editAbout.imageUrl" /></div>
          </div>
          <div class="modal-footer mt-3">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary" [disabled]="editForm.invalid || !editForm.dirty">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
