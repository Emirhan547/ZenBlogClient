<div class="main-layout">
   <header class="header sticky-top">
    <div class="container header-shell">
      <a routerLink="/" class="brand">
        <span class="brand-mark">ZB</span>
        <div>
          <p class="brand-name">ZenBlog</p>
          <small class="brand-subtitle">Stories with clarity</small>
        </div>
      </a>

      <nav id="navmenu" class="navmenu" [class.mobile-nav-active]="isMobileMenuOpen">
        <ul>
          <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
          <li><a routerLink="/about" routerLinkActive="active">About</a></li>
          <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
          <li><a routerLink="/login" routerLinkActive="active">{{ loggedIn() ? getFullName() : 'Login' }}</a></li>
        </ul>

      </nav>

     <div class="header-actions">
        <div class="header-social-links">
          <a href="#" class="twitter"><i class="bi bi-twitter-x"></i></a>
          <a href="#" class="facebook"><i class="bi bi-facebook"></i></a>
          <a href="#" class="instagram"><i class="bi bi-instagram"></i></a>
          <a href="#" class="linkedin"><i class="bi bi-linkedin"></i></a>
        </div>
        <button class="mobile-toggle-button" type="button" (click)="toggleMobileMenu()" aria-label="Toggle mobile menu">
          <i class="mobile-nav-toggle d-xl-none bi" [ngClass]="isMobileMenuOpen ? 'bi-x' : 'bi-list'"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="main container">

    <router-outlet></router-outlet>


  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <h4>ZenBlog</h4>
        <p>Modern blog deneyimi: sade arayüz, hızlı erişim, güçlü içerik yönetimi.</p>
      </div>
      <div>
        <h5>Pages</h5>
        <ul>
          <li><a routerLink="/">Home</a></li>
          <li><a routerLink="/about">About</a></li>
          <li><a routerLink="/contact">Contact</a></li>
          <li><a routerLink="/login">Login</a></li>
        </ul>
      </div>
      <div>
        <h5>Follow</h5>
        <div class="social-links">
          <a href=""><i class="bi bi-twitter-x"></i></a>
          <a href=""><i class="bi bi-facebook"></i></a>
          <a href=""><i class="bi bi-instagram"></i></a>
          <a href=""><i class="bi bi-linkedin"></i></a>
        </div>
      </div>
    </div>

   <div class="container copyright text-center">
      © ZenBlog - All Rights Reserved

    </div>
  </footer>

 <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center" (click)="scrollToTop($event)">
    <i class="bi bi-arrow-up-short"></i>
  </a>

 <div id="preloader"></div>
</div>
