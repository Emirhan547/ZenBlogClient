
<div class="admin-shell">
  <aside class="admin-sidebar">
    <a routerLink="/" class="admin-brand">
      <span class="admin-logo">ZB</span>
      <div>
        <p>ZenBlog</p>
        <small>Admin Panel</small>
      </div>
    </a>

    <ul class="admin-nav">
      <li><a routerLink="/admin/category" routerLinkActive="active"><i class="fa fa-list"></i>Categories</a></li>
      <li><a routerLink="/admin/blog" routerLinkActive="active"><i class="fa fa-image"></i>Blogs</a></li>
      <li><a routerLink="/admin/comment" routerLinkActive="active"><i class="fa fa-comment"></i>Comments</a></li>
      <li><a routerLink="/admin/contactinfo" routerLinkActive="active"><i class="fa fa-phone"></i>Contact Info</a></li>
      <li><a routerLink="/admin/message" routerLinkActive="active"><i class="fa fa-envelope"></i>Messages</a></li>
      <li><a routerLink="/admin/social" routerLinkActive="active"><i class="fa fa-linkedin"></i>Social Networks</a></li>
      <li><a routerLink="/admin/about" routerLinkActive="active"><i class="fa fa-info-circle"></i>About</a></li>
    </ul>

    <div class="admin-user-card">
      <div>
        <strong>{{ getUserName() }}</strong>
        <small>Administrator</small>
      </div>
      <button class="btn btn-sm btn-light" (click)="logout()">Sign out</button>
    </div>
  </aside>


  <section class="admin-content">
    <router-outlet></router-outlet>
  </section>
</div>
