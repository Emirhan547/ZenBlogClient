<section id="comment-form" class="comment-form section">
  <div class="container">

    <form #commentForm="ngForm" (ngSubmit)="createComment()">

       <h4>Yorum Gönder</h4>
      <p>E-posta adresiniz yayınlanmayacaktır. Zorunlu alanlar * ile işaretlenmiştir.</p>

      <div class="row">

        <div class="col-md-6 form-group">
          <input
            name="firstName"
            [(ngModel)]="newComment.firstName"
            type="text"
            class="form-control"
            placeholder="Adınız*"
            required>
        </div>

        <div class="col-md-6 form-group">
          <input
            name="lastName"
            [(ngModel)]="newComment.lastName"
            type="text"
            class="form-control"
           placeholder="Soyadınız*"
            required>
        </div>

        <div class="col-md-6 form-group">
          <input
            name="email"
            [(ngModel)]="newComment.email"
            type="email"
            class="form-control"
            placeholder="E-posta Adresiniz*"
            required>
        </div>

      </div>

      <div class="row">
        <div class="col form-group">
          <textarea
            name="body"
            [(ngModel)]="newComment.body"
            class="form-control"
            placeholder="Yorumunuz*"
            required>
          </textarea>
        </div>
      </div>

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-primary">
          Yorum Gönder
        </button>
      </div>

    </form>

  </div>
</section>
