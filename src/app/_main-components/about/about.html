<div class="page-title">
  <div class="container d-lg-flex justify-content-between align-items-center">
   <h1 class="mb-2 mb-lg-0">Hakkımızda</h1>

    <nav class="breadcrumbs">
      <ol>
        <li><a routerLink="/">Anasayfa</a></li>
        <li class="current">Hakkımızda</li>
      </ol>
    </nav>
  </div>
</div>

<section id="about" class="about section">

  <div class="container">

    <div class="row about-row align-items-stretch gy-5">

      <!-- IMAGE LEFT -->
      <div class="col-lg-6 order-lg-1 order-2">

        <div class="about-image-wrapper">

          <img
            [src]="about?.imageUrl || 'assets/img/about-company-1.jpg'"
            class="about-image"
          alt="Hakkımızda görseli">

        </div>

      </div>

      <!-- TEXT RIGHT -->
      <div class="col-lg-6 order-lg-2 order-1">

        <div class="about-card">

          <span class="about-badge">
            HAKKIMIZDA
          </span>

          <h2 class="about-title">
            {{ about?.title }}
          </h2>

          <p class="about-desc">
            {{ about?.description }}
          </p>

          <div class="about-actions">

            <a routerLink="/" class="btn-about-primary">
              Blogları Keşfet
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
